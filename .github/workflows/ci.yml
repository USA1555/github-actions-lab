name: Flask CI

on: push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r contact-list-manager/requirements.txt

      - name: Run tests
        run: |
          cd contact-list-manager
          pytest
